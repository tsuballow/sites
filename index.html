<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poriri.com</title>
  <style>
    :root {
      --bg-1: #120f05;
      --bg-2: #1f1807;
      --bg-3: #2c2208;
      --line: rgba(255, 244, 190, 0.12);
      --text: rgba(255, 251, 236, 0.97);
      --panel: rgba(255, 240, 190, 0.08);
      --panel-2: rgba(255, 248, 220, 0.04);
      --yellow: rgba(255, 222, 89, 0.34);
      --lemon: rgba(255, 241, 163, 0.26);
      --gold: rgba(255, 196, 61, 0.22);
      --white: rgba(255,255,255,0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, var(--lemon), transparent 26%),
        radial-gradient(circle at 82% 24%, var(--yellow), transparent 28%),
        radial-gradient(circle at 50% 78%, rgba(255, 215, 120, 0.16), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: radial-gradient(circle at center, black 34%, transparent 78%);
      opacity: 0.55;
      transform: perspective(1200px) rotateX(74deg) scale(1.85) translateY(22%);
      transform-origin: center center;
      animation: drift 14s ease-in-out infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.10), transparent 42%),
        radial-gradient(circle at center, rgba(255, 230, 120, 0.24), transparent 24%),
        radial-gradient(circle at center, rgba(255, 196, 61, 0.18), transparent 30%);
      filter: blur(28px);
      opacity: 0.95;
      animation: pulse 7s ease-in-out infinite;
    }

    main {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .frame {
      position: relative;
      padding: clamp(28px, 4vw, 48px) clamp(34px, 6vw, 76px);
      border: 1px solid rgba(255, 244, 190, 0.16);
      border-radius: 30px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 90px rgba(0,0,0,0.42),
        0 0 60px rgba(255, 222, 89, 0.14),
        0 0 90px rgba(255, 196, 61, 0.10);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,250,230,0.34), rgba(255,236,170,0.10), rgba(255,255,255,0.18));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.82;
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255, 244, 190, 0.08);
      pointer-events: none;
      opacity: 0.8;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text);
      text-shadow:
        0 0 12px rgba(255,255,255,0.20),
        0 0 24px rgba(255, 230, 120, 0.22),
        0 0 38px rgba(255, 196, 61, 0.18),
        0 0 54px rgba(255, 222, 89, 0.14);
      animation: float 6s ease-in-out infinite;
      user-select: none;
      white-space: nowrap;
      position: relative;
    }

    h1::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -0.14em;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 244, 190, 0.60), transparent);
      opacity: 0.72;
      filter: blur(0.6px);
    }

    .shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
    }

    .shine::before {
      content: "";
      position: absolute;
      inset: auto 14% 12% 14%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 241, 163, 0.76), rgba(255, 196, 61, 0.76), transparent);
      filter: blur(1px);
      opacity: 0.88;
    }

    .shine::after {
      content: "";
      position: absolute;
      top: -30%;
      left: -20%;
      width: 40%;
      height: 160%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.20), transparent);
      transform: rotate(18deg);
      animation: sweep 6.5s linear infinite;
      filter: blur(6px);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.84; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes drift {
      0% { transform: perspective(1200px) rotateX(74deg) scale(1.85) translateY(22%) translateX(-2%); }
      100% { transform: perspective(1200px) rotateX(74deg) scale(1.9) translateY(20%) translateX(2%); }
    }

    @keyframes sweep {
      0% { transform: translateX(-40vw) rotate(18deg); }
      100% { transform: translateX(140vw) rotate(18deg); }
    }
  </style>
</head>
<body>
  <main>
    <section class="frame" aria-label="poriri.com">
      <div class="shine"></div>
      <h1>poriri.com</h1>
    </section>
  </main>
</body>
</html>
