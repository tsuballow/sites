<!DOCTYPE html><html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poriri.com</title>
  <style>
    :root {
      --bg-1: #120f05;
      --bg-2: #1f1807;
      --bg-3: #2c2208;
      --line: rgba(255, 244, 190, 0.12);
      --text: rgba(255, 251, 236, 0.97);
      --panel: rgba(255, 240, 190, 0.08);
      --panel-2: rgba(255, 248, 220, 0.04);
      --yellow: rgba(255, 222, 89, 0.34);
      --lemon: rgba(255, 241, 163, 0.26);
      --gold: rgba(255, 196, 61, 0.22);
      --gold-solid: #f3c544;
      --gold-deep: #b88016;
      --pipe-dark: #6c490f;
      --pipe-shadow: #3e2806;
      --white: rgba(255,255,255,0.22);
    }* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 18% 18%, var(--lemon), transparent 26%),
    radial-gradient(circle at 82% 24%, var(--yellow), transparent 28%),
    radial-gradient(circle at 50% 78%, rgba(255, 215, 120, 0.16), transparent 30%),
    linear-gradient(145deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body::before,
body::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}

body::before {
  background:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 58px 58px;
  mask-image: radial-gradient(circle at center, black 34%, transparent 78%);
  opacity: 0.55;
  transform: perspective(1200px) rotateX(74deg) scale(1.85) translateY(22%);
  transform-origin: center center;
  animation: drift 14s ease-in-out infinite alternate;
}

body::after {
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.10), transparent 42%),
    radial-gradient(circle at center, rgba(255, 230, 120, 0.24), transparent 24%),
    radial-gradient(circle at center, rgba(255, 196, 61, 0.18), transparent 30%);
  filter: blur(28px);
  opacity: 0.95;
  animation: pulse 7s ease-in-out infinite;
}

.site-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: center;
  z-index: 5;
  pointer-events: none;
}

.menu-bar {
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255, 244, 190, 0.10), rgba(255, 248, 220, 0.05));
  border: 1px solid rgba(255, 244, 190, 0.14);
  box-shadow:
    0 8px 30px rgba(0,0,0,0.22),
    0 0 30px rgba(255, 222, 89, 0.08),
    inset 0 0 0 1px rgba(255,255,255,0.03);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
}

.pipe-trigger {
  appearance: none;
  border: 0;
  padding: 0;
  background: transparent;
  cursor: pointer;
  position: relative;
  width: min(76vw, 420px);
  height: 62px;
  border-radius: 999px;
  overflow: visible;
}

.pipe-shell {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1px solid rgba(255, 244, 190, 0.14);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
}

.pipe-viewport {
  position: absolute;
  left: 20px;
  top: 9px;
  width: 170px;
  height: 44px;
  overflow: visible;
}

.pipe {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background:
    linear-gradient(180deg, #ffd966 0%, #f6c848 45%, #d59522 100%);
  border: 2px solid rgba(92, 55, 3, 0.45);
  box-shadow:
    inset 0 6px 10px rgba(255,255,255,0.24),
    inset 0 -8px 14px rgba(92,55,3,0.22),
    0 10px 16px rgba(0,0,0,0.18),
    0 0 24px rgba(255, 214, 87, 0.22);
}

.pipe::before,
.pipe::after {
  content: "";
  position: absolute;
  top: -5px;
  width: 34px;
  height: 54px;
  border-radius: 16px;
  background: linear-gradient(180deg, #ffe88b 0%, #f3c544 55%, #cb8b18 100%);
  border: 2px solid rgba(92, 55, 3, 0.45);
  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.24),
    inset 0 -8px 12px rgba(92,55,3,0.18);
}

.pipe::before { left: -10px; }
.pipe::after { right: -10px; }

.pipe-gloss,
.pipe-shadow {
  position: absolute;
  left: 16px;
  right: 16px;
  border-radius: 999px;
  pointer-events: none;
}

.pipe-gloss {
  top: 6px;
  height: 9px;
  background: linear-gradient(90deg, rgba(255,255,255,0.0), rgba(255,255,255,0.38), rgba(255,255,255,0.0));
  filter: blur(1px);
  opacity: 0.9;
}

.pipe-shadow {
  bottom: 7px;
  height: 8px;
  background: linear-gradient(90deg, rgba(80,50,0,0), rgba(80,50,0,0.18), rgba(80,50,0,0));
  filter: blur(2px);
}

.pipe-label {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: rgba(58, 35, 4, 0.88);
  text-shadow: 0 1px 0 rgba(255,255,255,0.24);
  transition: opacity 380ms ease, transform 650ms cubic-bezier(.22,.8,.22,1);
  z-index: 3;
}

.slide-stage {
  position: absolute;
  left: 38px;
  top: 50%;
  width: 320px;
  height: 44px;
  transform: translateY(-50%);
  pointer-events: none;
  overflow: hidden;
}

.slide-track {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  transform: translateX(-132px);
  transition: transform 700ms cubic-bezier(.22,.8,.22,1);
  will-change: transform;
}

.future-illustration {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  flex: 0 0 auto;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 30%),
    linear-gradient(135deg, rgba(255, 241, 163, 0.95), rgba(255, 196, 61, 0.88));
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow:
    0 0 18px rgba(255, 214, 87, 0.18),
    inset 0 0 0 1px rgba(255,255,255,0.06);
  position: relative;
  opacity: 0;
  transform: translateX(-12px) scale(0.92);
  transition: opacity 420ms ease, transform 700ms cubic-bezier(.22,.8,.22,1);
}

.future-illustration::before {
  content: "";
  position: absolute;
  inset: 11px 9px 11px 9px;
  border-radius: 999px 999px 999px 999px / 70% 70% 55% 55%;
  background: linear-gradient(90deg, rgba(92,55,3,0.85), rgba(92,55,3,0.45));
  clip-path: polygon(0 45%, 70% 32%, 100% 50%, 70% 68%, 0 55%);
  opacity: 0.34;
}

.slide-text {
  height: 44px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(255, 244, 190, 0.16), rgba(255, 248, 220, 0.08));
  border: 1px solid rgba(255, 244, 190, 0.14);
  box-shadow:
    0 8px 24px rgba(0,0,0,0.18),
    inset 0 0 0 1px rgba(255,255,255,0.03);
  font-size: 0.98rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text);
  text-shadow: 0 0 12px rgba(255, 222, 89, 0.16);
  white-space: nowrap;
}

.pipe-trigger[aria-expanded="true"] .pipe-label {
  opacity: 0;
  transform: translateX(18px);
}

.pipe-trigger[aria-expanded="true"] .slide-track {
  transform: translateX(16px);
}

.pipe-trigger[aria-expanded="true"] .future-illustration {
  opacity: 1;
  transform: translateX(0) scale(1);
}

main {
  position: relative;
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  isolation: isolate;
  padding-top: 90px;
}

.frame {
  position: relative;
  padding: clamp(28px, 4vw, 48px) clamp(34px, 6vw, 76px);
  border: 1px solid rgba(255, 244, 190, 0.16);
  border-radius: 30px;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 24px 90px rgba(0,0,0,0.42),
    0 0 60px rgba(255, 222, 89, 0.14),
    0 0 90px rgba(255, 196, 61, 0.10);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
}

.frame::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, rgba(255,250,230,0.34), rgba(255,236,170,0.10), rgba(255,255,255,0.18));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.82;
  pointer-events: none;
}

.frame::after {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: 22px;
  border: 1px solid rgba(255, 244, 190, 0.08);
  pointer-events: none;
  opacity: 0.8;
}

h1 {
  margin: 0;
  font-size: clamp(2.2rem, 8vw, 7rem);
  font-weight: 700;
  letter-spacing: 0.16em;
  color: var(--text);
  text-shadow:
    0 0 12px rgba(255,255,255,0.20),
    0 0 24px rgba(255, 230, 120, 0.22),
    0 0 38px rgba(255, 196, 61, 0.18),
    0 0 54px rgba(255, 222, 89, 0.14);
  animation: float 6s ease-in-out infinite;
  user-select: none;
  white-space: nowrap;
  position: relative;
}

h1::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -0.14em;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 244, 190, 0.60), transparent);
  opacity: 0.72;
  filter: blur(0.6px);
}

.shine {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  overflow: hidden;
  pointer-events: none;
}

.shine::before {
  content: "";
  position: absolute;
  inset: auto 14% 12% 14%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 241, 163, 0.76), rgba(255, 196, 61, 0.76), transparent);
  filter: blur(1px);
  opacity: 0.88;
}

.shine::after {
  content: "";
  position: absolute;
  top: -30%;
  left: -20%;
  width: 40%;
  height: 160%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.20), transparent);
  transform: rotate(18deg);
  animation: sweep 6.5s linear infinite;
  filter: blur(6px);
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.84; }
  50% { transform: scale(1.08); opacity: 1; }
}

@keyframes drift {
  0% { transform: perspective(1200px) rotateX(74deg) scale(1.85) translateY(22%) translateX(-2%); }
  100% { transform: perspective(1200px) rotateX(74deg) scale(1.9) translateY(20%) translateX(2%); }
}

@keyframes sweep {
  0% { transform: translateX(-40vw) rotate(18deg); }
  100% { transform: translateX(140vw) rotate(18deg); }
}

@media (max-width: 680px) {
  .pipe-trigger {
    width: min(88vw, 380px);
  }

  .slide-stage {
    width: 260px;
  }

  .slide-track {
    transform: translateX(-142px);
  }

  .pipe-trigger[aria-expanded="true"] .slide-track {
    transform: translateX(4px);
  }

  .future-illustration {
    width: 38px;
    height: 38px;
  }

  .slide-text {
    height: 40px;
    padding: 0 14px;
    font-size: 0.9rem;
  }
}

  </style>
</head>
<body>
  <header class="site-header">
    <nav class="menu-bar" aria-label="menu">
      <button class="pipe-trigger" id="pipeTrigger" aria-expanded="false" aria-label="poriri.com menu">
        <span class="pipe-shell"></span>
        <span class="pipe-viewport">
          <span class="pipe"></span>
          <span class="pipe-gloss"></span>
          <span class="pipe-shadow"></span>
          <span class="pipe-label">poriri.com</span>
        </span>
        <span class="slide-stage" aria-hidden="true">
          <span class="slide-track">
            <span class="future-illustration"></span>
            <span class="slide-text">poriri.com</span>
          </span>
        </span>
      </button>
    </nav>
  </header>  <main>
    <section class="frame" aria-label="poriri.com">
      <div class="shine"></div>
      <h1>poriri.com</h1>
    </section>
  </main>  <script>
    const trigger = document.getElementById('pipeTrigger');

    trigger.addEventListener('click', () => {
      const expanded = trigger.getAttribute('aria-expanded') === 'true';
      trigger.setAttribute('aria-expanded', String(!expanded));
    });
  </script></body>
</html>
