<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poriri.com</title>
  <style>
    :root {
      --bg-1: #120f05;
      --bg-2: #1f1807;
      --bg-3: #2c2208;
      --line: rgba(255, 244, 190, 0.12);
      --text: rgba(255, 251, 236, 0.97);
      --panel: rgba(255, 240, 190, 0.08);
      --panel-2: rgba(255, 248, 220, 0.04);
      --yellow: rgba(255, 222, 89, 0.34);
      --lemon: rgba(255, 241, 163, 0.26);
      --gold: rgba(255, 196, 61, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, var(--lemon), transparent 26%),
        radial-gradient(circle at 82% 24%, var(--yellow), transparent 28%),
        radial-gradient(circle at 50% 78%, rgba(255, 215, 120, 0.16), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: radial-gradient(circle at center, black 34%, transparent 78%);
      opacity: 0.34;
      transform: perspective(1200px) rotateX(74deg) scale(1.85) translateY(22%);
      transform-origin: center center;
      animation: drift 14s ease-in-out infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 42%),
        radial-gradient(circle at center, rgba(255, 230, 120, 0.20), transparent 24%),
        radial-gradient(circle at center, rgba(255, 196, 61, 0.14), transparent 30%);
      filter: blur(28px);
      opacity: 0.82;
      animation: pulse 7s ease-in-out infinite;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 18px 16px;
      display: flex;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }

    .menu-bar {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(92vw, 720px);
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(18, 15, 5, 0.12);
      border: 1px solid rgba(255, 244, 190, 0.1);
      box-shadow:
        0 8px 24px rgba(0,0,0,0.16),
        0 0 24px rgba(255, 222, 89, 0.06),
        inset 0 0 0 1px rgba(255,255,255,0.02);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
    }

    .pipe-trigger {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      position: relative;
      width: min(100%, 680px);
      height: clamp(58px, 8vw, 84px);
      border-radius: 999px;
      overflow: hidden;
      --pipe-width: clamp(154px, 24vw, 240px);
      --pipe-height: clamp(44px, 6vw, 66px);
      --slide-shift-closed: calc((var(--pipe-width) * -1) + 34px);
      --slide-shift-open: clamp(10px, 2vw, 18px);
    }

    .pipe-shell {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: transparent;
      border: 1px solid rgba(255, 244, 190, 0.04);
      box-shadow: none;
      pointer-events: none;
    }

    .pipe-viewport {
      position: absolute;
      left: clamp(10px, 2vw, 18px);
      top: 50%;
      width: var(--pipe-width);
      height: var(--pipe-height);
      transform: translateY(-50%);
      z-index: 2;
      display: grid;
      place-items: center;
    }

    .pipe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.16)) drop-shadow(0 0 18px rgba(255, 214, 87, 0.16));
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .pipe-label {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding-inline: 12px;
      font-size: clamp(0.8rem, 1.4vw, 0.98rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(58, 35, 4, 0.88);
      text-shadow: 0 1px 0 rgba(255,255,255,0.24);
      text-align: center;
      z-index: 3;
      pointer-events: none;
      transition: opacity 360ms ease, transform 650ms cubic-bezier(.22,.8,.22,1);
    }

    .slide-stage {
      position: absolute;
      left: clamp(18px, 4vw, 34px);
      right: 12px;
      top: 50%;
      height: clamp(40px, 6vw, 50px);
      transform: translateY(-50%);
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .slide-track {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateX(var(--slide-shift-closed));
      transition: transform 700ms cubic-bezier(.22,.8,.22,1);
      will-change: transform;
      max-width: 100%;
    }

    .future-illustration {
      width: clamp(32px, 5vw, 42px);
      height: clamp(32px, 5vw, 42px);
      border-radius: 12px;
      flex: 0 0 auto;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 30%),
        linear-gradient(135deg, rgba(255, 241, 163, 0.95), rgba(255, 196, 61, 0.88));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        0 0 18px rgba(255, 214, 87, 0.16),
        inset 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
      opacity: 0;
      transform: translateX(-10px) scale(0.92);
      transition: opacity 420ms ease, transform 700ms cubic-bezier(.22,.8,.22,1);
    }

    .future-illustration::before {
      content: "";
      position: absolute;
      inset: 9px 7px;
      border-radius: 999px / 70% 70% 55% 55%;
      background: linear-gradient(90deg, rgba(92,55,3,0.85), rgba(92,55,3,0.45));
      clip-path: polygon(0 45%, 70% 32%, 100% 50%, 70% 68%, 0 55%);
      opacity: 0.34;
    }

    .slide-text {
      height: 100%;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 244, 190, 0.16), rgba(255, 248, 220, 0.08));
      border: 1px solid rgba(255, 244, 190, 0.12);
      box-shadow:
        0 6px 18px rgba(0,0,0,0.14),
        inset 0 0 0 1px rgba(255,255,255,0.02);
      font-size: clamp(0.76rem, 1.2vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      text-shadow: 0 0 10px rgba(255, 222, 89, 0.14);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .pipe-trigger[aria-expanded="true"] .pipe-label {
      opacity: 0;
      transform: translateX(16px);
    }

    .pipe-trigger[aria-expanded="true"] .slide-track {
      transform: translateX(var(--slide-shift-open));
    }

    .pipe-trigger[aria-expanded="true"] .future-illustration {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    main {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      isolation: isolate;
      padding: 116px 18px 32px;
    }

    .frame {
      position: relative;
      width: min(92vw, 920px);
      min-height: min(42dvh, 360px);
      display: grid;
      place-items: center;
      padding: clamp(26px, 4vw, 48px) clamp(22px, 6vw, 76px);
      border: 1px solid rgba(255, 244, 190, 0.16);
      border-radius: 30px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 90px rgba(0,0,0,0.42),
        0 0 60px rgba(255, 222, 89, 0.14),
        0 0 90px rgba(255, 196, 61, 0.10);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,250,230,0.34), rgba(255,236,170,0.10), rgba(255,255,255,0.18));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.82;
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255, 244, 190, 0.08);
      pointer-events: none;
      opacity: 0.8;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 7rem);
      font-weight: 700;
      letter-spacing: clamp(0.08em, 0.8vw, 0.16em);
      color: var(--text);
      text-shadow:
        0 0 12px rgba(255,255,255,0.20),
        0 0 24px rgba(255, 230, 120, 0.22),
        0 0 38px rgba(255, 196, 61, 0.18),
        0 0 54px rgba(255, 222, 89, 0.14);
      animation: float 6s ease-in-out infinite;
      user-select: none;
      white-space: nowrap;
      position: relative;
      text-align: center;
      line-height: 1.05;
      max-width: 100%;
    }

    h1::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -0.14em;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 244, 190, 0.60), transparent);
      opacity: 0.72;
      filter: blur(0.6px);
    }

    .shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
    }

    .shine::before {
      content: "";
      position: absolute;
      inset: auto 14% 12% 14%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 241, 163, 0.76), rgba(255, 196, 61, 0.76), transparent);
      filter: blur(1px);
      opacity: 0.88;
    }

    .shine::after {
      content: "";
      position: absolute;
      top: -30%;
      left: -20%;
      width: 40%;
      height: 160%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.20), transparent);
      transform: rotate(18deg);
      animation: sweep 6.5s linear infinite;
      filter: blur(6px);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.84; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes drift {
      0% { transform: perspective(1200px) rotateX(74deg) scale(1.85) translateY(22%) translateX(-2%); }
      100% { transform: perspective(1200px) rotateX(74deg) scale(1.9) translateY(20%) translateX(2%); }
    }

    @keyframes sweep {
      0% { transform: translateX(-40vw) rotate(18deg); }
      100% { transform: translateX(140vw) rotate(18deg); }
    }

    @media (max-width: 680px) {
      body::before {
        opacity: 0.16;
        background-size: 82px 82px;
        transform: perspective(1000px) rotateX(78deg) scale(1.25) translateY(30%);
      }

      body::after {
        opacity: 0.48;
        filter: blur(32px);
      }

      .site-header {
        padding: 12px 10px;
      }

      .menu-bar {
        width: min(92vw, 320px);
        padding: 8px 10px;
        background: rgba(18, 15, 5, 0.14);
      }

      .pipe-trigger {
        width: 100%;
        height: 54px;
        --pipe-width: 154px;
        --pipe-height: 42px;
        --slide-shift-closed: -118px;
        --slide-shift-open: -2px;
      }

      .pipe-viewport {
        left: 8px;
      }

      .pipe-label {
        font-size: 0.84rem;
        letter-spacing: 0.07em;
        padding-inline: 8px;
      }

      .slide-stage {
        left: 10px;
        right: 8px;
        height: 38px;
      }

      .slide-track {
        gap: 8px;
      }

      .future-illustration {
        width: 30px;
        height: 30px;
        border-radius: 10px;
      }

      .future-illustration::before {
        inset: 8px 7px;
      }

      .slide-text {
        padding: 0 11px;
        font-size: 0.76rem;
        letter-spacing: 0.06em;
      }

      main {
        min-height: 100dvh;
        padding: 94px 14px 24px;
        align-content: start;
      }

      .frame {
        width: min(92vw, 360px);
        min-height: 200px;
        padding: 24px 16px;
        border-radius: 24px;
      }

      .frame::after {
        inset: 8px;
        border-radius: 18px;
      }

      h1 {
        font-size: clamp(1.7rem, 9vw, 2.7rem);
        letter-spacing: 0.06em;
        white-space: normal;
        word-break: break-word;
      }
    }

    @media (min-width: 681px) and (max-width: 980px) {
      body::before {
        opacity: 0.24;
      }

      .menu-bar {
        width: min(92vw, 520px);
        background: rgba(18, 15, 5, 0.13);
      }

      .pipe-trigger {
        width: min(100%, 500px);
        --pipe-width: 200px;
        --pipe-height: 56px;
        --slide-shift-closed: -150px;
      }

      .frame {
        width: min(88vw, 760px);
        min-height: 280px;
      }

      h1 {
        white-space: normal;
      }
    }
  </style>
</head>

  <main>
    <section class="frame" aria-label="poriri.com">
      <div class="shine"></div>
      <h1>poriri.com</h1>
    </section>
  </main>

  <script>
    const trigger = document.getElementById('pipeTrigger');

    trigger.addEventListener('click', () => {
      const expanded = trigger.getAttribute('aria-expanded') === 'true';
      trigger.setAttribute('aria-expanded', String(!expanded));
    });
  </script>
</body>
