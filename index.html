<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poriri.com</title>
  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #0b1026;
      --line: rgba(255,255,255,0.08);
      --glow: rgba(124, 92, 255, 0.35);
      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 119, 198, 0.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255, 119, 198, 0.12), transparent 32%),
        radial-gradient(circle at 50% 80%, rgba(119, 227, 255, 0.12), transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 78%);
      opacity: 0.5;
      transform: perspective(1200px) rotateX(74deg) scale(1.8) translateY(22%);
      transform-origin: center center;
      animation: drift 14s ease-in-out infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 45%),
        radial-gradient(circle at center, var(--glow), transparent 28%);
      filter: blur(22px);
      opacity: 0.9;
      animation: pulse 7s ease-in-out infinite;
    }

    main {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .frame {
      position: relative;
      padding: clamp(28px, 4vw, 48px) clamp(34px, 6vw, 72px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 20px 80px rgba(0,0,0,0.45),
        0 0 80px rgba(124, 92, 255, 0.14);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.36), rgba(255,255,255,0.04), rgba(255,255,255,0.18));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.7;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: none;
      color: var(--text);
      text-shadow:
        0 0 12px rgba(255,255,255,0.22),
        0 0 28px rgba(124, 92, 255, 0.24),
        0 0 42px rgba(124, 92, 255, 0.18);
      animation: float 6s ease-in-out infinite;
      user-select: none;
      white-space: nowrap;
    }

    .shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
    }

    .shine::after {
      content: "";
      position: absolute;
      top: -30%;
      left: -20%;
      width: 40%;
      height: 160%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
      transform: rotate(18deg);
      animation: sweep 6.5s linear infinite;
      filter: blur(6px);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes drift {
      0% { transform: perspective(1200px) rotateX(74deg) scale(1.8) translateY(22%) translateX(-2%); }
      100% { transform: perspective(1200px) rotateX(74deg) scale(1.85) translateY(20%) translateX(2%); }
    }

    @keyframes sweep {
      0% { transform: translateX(-40vw) rotate(18deg); }
      100% { transform: translateX(140vw) rotate(18deg); }
    }
  </style>
</head>
<body>
  <main>
    <section class="frame" aria-label="poriri.com">
      <div class="shine"></div>
      <h1>poriri.com</h1>
    </section>
  </main>
</body>
</html>
